<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alum Creek Trail Conditions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      padding: 24px 0 20px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .updated {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .updated-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stale-warning {
      display: block;
      margin-top: 6px;
      font-size: 0.75rem;
      color: #f59e0b;
      font-weight: 500;
    }

    .trails {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .trail-section {
      background: #1a1d27;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #2a2d3a;
    }

    .trail-name {
      font-size: 1rem;
      font-weight: 600;
      color: #c9d1e8;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2d3a;
    }

    .day-row { margin-bottom: 10px; }
    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .day-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .day-signal { font-size: 0.7rem; color: #6b7280; }

    .slots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .slot-card {
      border-radius: 8px;
      padding: 8px 4px 6px;
      text-align: center;
      color: #fff;
    }
    .slot-time {
      font-size: 0.65rem;
      font-weight: 600;
      opacity: 0.85;
      margin-bottom: 3px;
    }
    .slot-pct {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    /* Feedback buttons — only shown on today's slots */
    .slot-feedback {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 2px;
    }
    .fb-btn {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: rgba(255,255,255,0.55);
      font-size: 0.65rem;
      padding: 2px 5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1.4;
    }
    .fb-btn:hover { background: rgba(0,0,0,0.4); color: #fff; border-color: rgba(255,255,255,0.4); }
    .fb-btn.active-up { background: rgba(34,197,94,0.35); border-color: #22c55e; color: #fff; }
    .fb-btn.active-dn { background: rgba(239,68,68,0.35); border-color: #ef4444; color: #fff; }

    /* Weekly cards */
    .week-days {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-top: 10px;
    }
    .day-card {
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      color: #fff;
    }
    .day-card .card-name {
      font-size: 0.65rem;
      font-weight: 600;
      opacity: 0.85;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .day-card .card-pct { font-size: 1rem; font-weight: 700; }
    .day-card .card-signal {
      font-size: 0.55rem;
      opacity: 0.75;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Report section */
    .report-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #2a2d3a;
    }
    .report-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .report-card {
      background: #111320;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .report-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .report-body { flex: 1; min-width: 0; }
    .report-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }
    .report-user { font-size: 0.8rem; font-weight: 600; color: #c9d1e8; }
    .report-user.trusted { color: #60a5fa; }
    .trusted-badge {
      font-size: 0.6rem;
      background: #1e3a5f;
      color: #60a5fa;
      border-radius: 4px;
      padding: 1px 5px;
      font-weight: 600;
    }
    .report-age { font-size: 0.7rem; color: #6b7280; margin-left: auto; }
    .report-comment { font-size: 0.75rem; color: #9ca3af; line-height: 1.4; }
    .no-report { font-size: 0.75rem; color: #6b7280; font-style: italic; }

    /* Footer */
    footer {
      max-width: 900px;
      margin: 24px auto 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .feedback-hint {
      font-size: 0.72rem;
      color: #4b5563;
      line-height: 1.5;
    }
    .export-btn {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #9ca3af;
      font-size: 0.75rem;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .export-btn:hover { border-color: #60a5fa; color: #60a5fa; }
    .export-btn:disabled { opacity: 0.4; cursor: default; }

    .error-msg { text-align: center; color: #ef4444; padding: 40px; font-size: 0.9rem; }
    .loading { text-align: center; color: #6b7280; padding: 60px; }
  </style>
</head>
<body>
  <header>
    <h1>Alum Creek Trail Conditions</h1>
    <div class="updated" id="updated-time"></div>
  </header>

  <div class="trails" id="trails">
    <div class="loading">Loading predictions…</div>
  </div>

  <footer>
    <div class="feedback-hint">
      👍/👎 on today's slots = actual conditions you observed.<br>
      Export and commit to <code>data/user_feedback.json</code> to improve the model.
    </div>
    <button class="export-btn" id="export-btn" onclick="exportFeedback()">Export Feedback</button>
  </footer>

  <script>
    const COLOR_DOT = { green: '#22c55e', yellow: '#f59e0b', red: '#ef4444' };
    const TRUSTED = new Set(['combo-trails', 'timothy-ross']);
    const FEEDBACK_KEY = 'mtcp_feedback_v1';
    const TODAY = new Date().toISOString().split('T')[0];

    // --- Feedback storage ---

    function getFeedbackLog() {
      try { return JSON.parse(localStorage.getItem(FEEDBACK_KEY) || '[]'); }
      catch { return []; }
    }

    function getSlotVote(date, trail, slot) {
      const entry = getFeedbackLog().find(e => e.date === date && e.trail === trail && e.slot === slot);
      return entry ? entry.vote : null;
    }

    function recordFeedback(date, trail, trailId, hour, slot, score, vote, btn) {
      const log = getFeedbackLog();
      const idx = log.findIndex(e => e.date === date && e.trail === trail && e.slot === slot);
      const entry = { date, trail, trail_id: trailId, slot, hour, vote, model_score: score,
                      voted_at: new Date().toISOString() };
      if (idx >= 0) log[idx] = entry; else log.push(entry);
      localStorage.setItem(FEEDBACK_KEY, JSON.stringify(log));

      const card = btn.closest('.slot-card');
      card.querySelectorAll('.fb-btn').forEach(b => b.classList.remove('active-up', 'active-dn'));
      btn.classList.add(vote === 1 ? 'active-up' : 'active-dn');
    }

    function exportFeedback() {
      const log = getFeedbackLog();
      if (!log.length) { alert('No feedback recorded yet — vote on some slots first.'); return; }
      const blob = new Blob([JSON.stringify(log, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `trail_feedback_${TODAY}.json`;
      a.click();
    }

    // --- Rendering ---

    function scoreColor(s) {
      const hue = s * 120;
      const sat = 65 + s * 20;
      const light = 32 + s * 8;
      return `hsl(${hue.toFixed(0)}, ${sat.toFixed(0)}%, ${light.toFixed(0)}%)`;
    }

    function pct(s) { return Math.round(s * 100) + '%'; }

    function reportAge(report) {
      if (!report) return '';
      if (report.hours_ago !== null && report.hours_ago !== undefined) {
        if (report.hours_ago === 0) return 'just now';
        if (report.hours_ago === 1) return '1 hr ago';
        return report.hours_ago + ' hrs ago';
      }
      if (!report.date) return '';
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(report.date + 'T00:00:00');
      const diff = Math.round((today - d) / 86400000);
      if (diff <= 0) return 'today';
      if (diff === 1) return 'yesterday';
      return diff + ' days ago';
    }

    function renderSlots(slots, trailKey, trailId, date) {
      const isToday = date === TODAY;
      return `<div class="slots">${slots.map(s => {
        const vote = isToday ? getSlotVote(date, trailKey, s.slot) : null;
        const fbHtml = isToday ? `
          <div class="slot-feedback">
            <button class="fb-btn${vote===1?' active-up':''}"
                    onclick="recordFeedback('${date}','${trailKey}',${trailId},${s.hour},'${s.slot}',${s.score},1,this)">👍</button>
            <button class="fb-btn${vote===-1?' active-dn':''}"
                    onclick="recordFeedback('${date}','${trailKey}',${trailId},${s.hour},'${s.slot}',${s.score},-1,this)">👎</button>
          </div>` : '';
        return `
          <div class="slot-card" style="background:${scoreColor(s.score)}">
            <div class="slot-time">${s.slot}</div>
            <div class="slot-pct">${pct(s.score)}</div>
            ${fbHtml}
          </div>`;
      }).join('')}</div>`;
    }

    function renderDayRow(day, trailKey, trailId) {
      const hasSlots = day.slots && day.slots.length;
      return `
        <div class="day-row">
          <div class="day-header">
            <span class="day-label">${day.day_name}</span>
            <span class="day-signal">${day.signal}</span>
          </div>
          ${hasSlots
            ? renderSlots(day.slots, trailKey, trailId, day.date)
            : `<div class="slots">
                 <div class="slot-card" style="background:${scoreColor(day.score)};grid-column:1/-1;padding:10px;">
                   <div class="slot-pct" style="font-size:1.3rem">${pct(day.score)}</div>
                 </div>
               </div>`}
        </div>`;
    }

    function renderWeekCard(day) {
      return `
        <div class="day-card" style="background:${scoreColor(day.score)}">
          <div class="card-name">${day.day_name}</div>
          <div class="card-pct">${pct(day.score)}</div>
          <div class="card-signal">${day.signal}</div>
        </div>`;
    }

    function renderReport(report) {
      if (!report) return '<div class="no-report">No recent reports found.</div>';
      const trusted = TRUSTED.has(report.username);
      const age = reportAge(report);
      const dot = COLOR_DOT[report.color] || COLOR_DOT.yellow;
      return `
        <div class="report-card">
          <div class="report-dot" style="background:${dot}"></div>
          <div class="report-body">
            <div class="report-meta">
              <span class="report-user${trusted ? ' trusted' : ''}">${report.username || 'unknown'}</span>
              ${trusted ? '<span class="trusted-badge">trusted</span>' : ''}
              <span class="report-age">${age}</span>
            </div>
            ${report.comment ? `<div class="report-comment">${report.comment}</div>` : ''}
          </div>
        </div>`;
    }

    function renderTrail(trailKey, trail) {
      const [today, tomorrow, ...rest] = trail.days;
      return `
        <div class="trail-section">
          <div class="trail-name">${trail.trail_name}</div>
          ${renderDayRow(today, trailKey, trail.trail_id || (trailKey === 'phase1' ? 0 : 1))}
          ${tomorrow ? renderDayRow(tomorrow, trailKey, trail.trail_id || (trailKey === 'phase1' ? 0 : 1)) : ''}
          ${rest.length ? `<div class="week-days">${rest.map(renderWeekCard).join('')}</div>` : ''}
          <div class="report-section">
            <div class="report-label">Latest MTBProject Report</div>
            ${renderReport(trail.recent_report)}
          </div>
        </div>`;
    }

    function formatUpdated(isoStr) {
      try {
        const d = new Date(isoStr);
        const now = new Date();
        const diffMin = Math.round((now - d) / 60000);
        const diffH = diffMin / 60;
        let text, dotColor, stale;
        if (diffMin < 2)       { text = 'Updated just now';               dotColor = '#22c55e'; stale = false; }
        else if (diffMin < 60) { text = `Updated ${diffMin} min ago`;     dotColor = '#22c55e'; stale = false; }
        else if (diffH < 7)    { text = `Updated ${Math.round(diffH)}h ago`; dotColor = '#22c55e'; stale = false; }
        else if (diffH < 13)   { text = `Updated ${Math.round(diffH)}h ago`; dotColor = '#f59e0b'; stale = false; }
        else                   { text = `Updated ${Math.round(diffH)}h ago`; dotColor = '#ef4444'; stale = true; }
        return { text, dotColor, stale };
      } catch { return { text: 'Unknown', dotColor: '#6b7280', stale: false }; }
    }

    fetch('predictions.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => {
        const { text, dotColor, stale } = formatUpdated(data.generated_at);
        const el = document.getElementById('updated-time');
        el.innerHTML = `<span class="updated-dot" style="background:${dotColor}"></span>${text}`
          + (stale ? '<span class="stale-warning">⚠ Predictions may be outdated</span>' : '');

        document.getElementById('trails').innerHTML =
          Object.entries(data.trails).map(([k, v]) => renderTrail(k, v)).join('');
      })
      .catch(err => {
        document.getElementById('trails').innerHTML =
          `<div class="error-msg">Failed to load predictions: ${err.message}<br>
           <small>Run predict.py to generate predictions.json</small></div>`;
      });
  </script>
</body>
</html>
