<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alum Creek Trail Conditions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      padding: 24px 0 20px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .updated {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .updated-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stale-warning {
      display: block;
      margin-top: 6px;
      font-size: 0.75rem;
      color: #f59e0b;
      font-weight: 500;
    }

    .trails {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .trail-section {
      background: #1a1d27;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #2a2d3a;
    }

    .trail-name {
      font-size: 1rem;
      font-weight: 600;
      color: #c9d1e8;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2d3a;
    }

    .day-row { margin-bottom: 10px; }
    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .day-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .day-signal { font-size: 0.7rem; color: #6b7280; }

    .slots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .slot-card {
      border-radius: 8px;
      padding: 8px 4px 6px;
      text-align: center;
      color: #fff;
    }
    .slot-time {
      font-size: 0.65rem;
      font-weight: 600;
      opacity: 0.85;
      margin-bottom: 3px;
    }
    .slot-pct {
      font-size: 1rem;
      font-weight: 700;
    }

    /* Feedback dots — inside today's slot cards, stacked below pct */
    .slot-feedback {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      margin-top: 4px;
      background: rgba(15,17,23,0.75);
      border-radius: 4px;
      padding: 3px 5px;
    }
    .fb-label {
      font-size: 0.5rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .fb-dots { display: flex; gap: 4px; }
    .fb-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      opacity: 0.25;
      transition: opacity 0.15s, transform 0.1s;
      padding: 0;
    }
    .fb-dot:hover { opacity: 0.65; transform: scale(1.15); }
    .fb-dot.active { opacity: 1; }
    .fb-dot.dim { opacity: 0.1; }

    /* Slot intraday signals */
    .slot-signals {
      font-size: 0.5rem;
      color: rgba(255,255,255,0.75);
      margin-top: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      line-height: 1.3;
    }

    /* Weekly cards */
    .week-days {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-top: 10px;
    }
    .day-card {
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      color: #fff;
    }
    .day-card .card-name {
      font-size: 0.65rem;
      font-weight: 600;
      opacity: 0.85;
      margin-bottom: 2px;
    }
    .day-card .card-pct { font-size: 1rem; font-weight: 700; }
    .day-card .card-signal {
      font-size: 0.55rem;
      opacity: 0.75;
      margin-top: 2px;
    }

    /* Report section */
    .report-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #2a2d3a;
    }
    .report-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .report-card {
      background: #111320;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .report-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .report-body { flex: 1; min-width: 0; }
    .report-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }
    .report-user { font-size: 0.8rem; font-weight: 600; color: #c9d1e8; }
    .report-user.trusted { color: #60a5fa; }
    .trusted-badge {
      font-size: 0.6rem;
      background: #1e3a5f;
      color: #60a5fa;
      border-radius: 4px;
      padding: 1px 5px;
      font-weight: 600;
    }
    .report-age { font-size: 0.7rem; color: #6b7280; margin-left: auto; }
    .report-comment { font-size: 0.75rem; color: #9ca3af; line-height: 1.4; }
    .no-report { font-size: 0.75rem; color: #6b7280; font-style: italic; }

    /* Footer */
    footer {
      max-width: 900px;
      margin: 24px auto 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .feedback-hint {
      font-size: 0.72rem;
      color: #4b5563;
      line-height: 1.5;
    }
    .export-btn {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #9ca3af;
      font-size: 0.75rem;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .export-btn:hover { border-color: #60a5fa; color: #60a5fa; }
    .export-btn:disabled { opacity: 0.4; cursor: default; }

    /* Model disagreement warning */
    .slot-pct-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .warn-wrap { position: relative; }
    .warn-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-size: 0.72rem;
      line-height: 1;
    }
    .warn-tip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1d27;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.7rem;
      color: #e8eaf0;
      min-width: 170px;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .warn-tip.open { display: block; }
    @media (hover: hover) {
      .warn-wrap:hover .warn-tip { display: block; }
    }
    .warn-table { border-collapse: collapse; width: 100%; }
    .warn-table th { font-weight: 600; color: #c9d1e8; text-align: center; padding: 0 10px 4px; font-size: 0.68rem; }
    .warn-table th a { color: inherit; text-decoration: none; border-bottom: 1px dotted #6b7280; }
    .warn-table td { text-align: center; padding: 3px 10px; }
    .warn-table td:first-child { text-align: left; color: #9ca3af; padding-left: 0; }
    .warn-table tr:not(:first-child) td { border-top: 1px solid rgba(255,255,255,0.07); }

    .error-msg { text-align: center; color: #ef4444; padding: 40px; font-size: 0.9rem; }
    .loading { text-align: center; color: #6b7280; padding: 60px; }
  </style>
</head>
<body>
  <header>
    <h1>Alum Creek Trail Conditions</h1>
    <div class="updated" id="updated-time"></div>
  </header>

  <div class="trails" id="trails">
    <div class="loading">Loading predictions…</div>
  </div>

  <footer>
    <div class="feedback-hint">
      Green/red dots below today's slots = your actual observed conditions.<br>
      Votes sync automatically — model retrains weekly using your feedback.
    </div>
  </footer>

  <script>
    const COLOR_DOT = { green: '#22c55e', yellow: '#f59e0b', red: '#ef4444' };
    const TRUSTED = new Set(['combo-trails', 'timothy-ross']);
    const FEEDBACK_KEY = 'mtcp_feedback_v1';
    const TODAY = new Date().toISOString().split('T')[0];  // UTC date, used for export filename only
    const VOTES_URL = 'https://mtcp-votes.mr-tony-82.workers.dev';

    // --- Feedback storage ---

    let remoteVotesMap = {};  // populated from Cloudflare on load; keyed trail:date:slot

    function getFeedbackLog() {
      try { return JSON.parse(localStorage.getItem(FEEDBACK_KEY) || '[]'); }
      catch { return []; }
    }

    function getSlotVote(date, trail, slot) {
      const remoteKey = `${trail}:${date}:${slot}`;
      if (remoteVotesMap[remoteKey] !== undefined) return remoteVotesMap[remoteKey];
      const entry = getFeedbackLog().find(e => e.date === date && e.trail === trail && e.slot === slot);
      return entry ? entry.vote : null;
    }

    function recordFeedback(date, trail, trailId, hour, slot, score, vote, btn) {
      const log = getFeedbackLog();
      const idx = log.findIndex(e => e.date === date && e.trail === trail && e.slot === slot);
      const entry = { date, trail, trail_id: trailId, slot, hour, vote, model_score: score,
                      voted_at: new Date().toISOString() };
      if (idx >= 0) log[idx] = entry; else log.push(entry);
      localStorage.setItem(FEEDBACK_KEY, JSON.stringify(log));

      if (VOTES_URL) {
        fetch(VOTES_URL + '/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(entry),
        }).catch(() => {});  // fire-and-forget; localStorage is the fallback
      }

      const container = btn.closest('.slot-feedback');
      container.querySelectorAll('.fb-dot').forEach(d => {
        const dv = parseInt(d.dataset.vote);
        d.classList.toggle('active', dv === vote);
        d.classList.toggle('dim', dv !== vote);
      });
    }

    function toggleWarn(e, btn) {
      e.stopPropagation();
      const tip = btn.nextElementSibling;
      const isOpen = tip.classList.contains('open');
      document.querySelectorAll('.warn-tip.open').forEach(t => t.classList.remove('open'));
      if (!isOpen) tip.classList.add('open');
    }
    document.addEventListener('click', () => {
      document.querySelectorAll('.warn-tip.open').forEach(t => t.classList.remove('open'));
    });

    function exportFeedback() {
      const log = getFeedbackLog();
      if (!log.length) { alert('No feedback recorded yet — vote on some slots first.'); return; }
      const blob = new Blob([JSON.stringify(log, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `trail_feedback_${TODAY}.json`;
      a.click();
    }

    // --- Rendering ---

    function scoreColor(s) {
      const hue = s * 120;
      const sat = 65 + s * 20;
      const light = 32 + s * 8;
      return `hsl(${hue.toFixed(0)}, ${sat.toFixed(0)}%, ${light.toFixed(0)}%)`;
    }

    function pct(s) { return Math.round(s * 100) + '%'; }

    function reportAge(report) {
      if (!report) return '';
      if (report.hours_ago !== null && report.hours_ago !== undefined) {
        if (report.hours_ago === 0) return 'just now';
        if (report.hours_ago === 1) return '1 hr ago';
        return report.hours_ago + ' hrs ago';
      }
      if (!report.date) return '';
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(report.date + 'T00:00:00');
      const diff = Math.round((today - d) / 86400000);
      if (diff <= 0) return 'today';
      if (diff === 1) return 'yesterday';
      return diff + ' days ago';
    }

    function mmStr(v) { return v !== null && v !== undefined ? v.toFixed(1) + 'mm' : '—'; }
    function hrsStr(h) {
      if (h === null || h === undefined) return '—';
      return h >= 48 ? Math.round(h / 24) + 'd dry' : Math.round(h) + 'h dry';
    }

    function warnIcon(s) {
      const ms = s.model_scores;
      if (!ms || ms.ifs === undefined || ms.nbm === undefined) return '';
      if (Math.abs(ms.ifs - ms.nbm) < 0.25) return '';
      const mp = s.model_precip || {};
      const mpi = mp.ifs || {}, mpn = mp.nbm || {}, mpe = mp.ensemble || {};
      return `
        <div class="warn-wrap">
          <button class="warn-btn" onclick="toggleWarn(event,this)">⚠️</button>
          <div class="warn-tip">
            <table class="warn-table">
              <tr>
                <th></th><th><a href="feature_importances.html" target="_blank">IFS</a></th><th><a href="feature_importances.html" target="_blank">NBM</a></th><th><a href="feature_importances.html" target="_blank">Ens</a></th>
              </tr><tr>
                <td>%</td>
                <td>${pct(ms.ifs)}</td><td>${pct(ms.nbm)}</td><td>${pct(ms.ensemble)}</td>
              </tr><tr>
                <td>fcst</td>
                <td>${mmStr(mpi.fcst)}</td><td>${mmStr(mpn.fcst)}</td><td>${mmStr(mpe.fcst)}</td>
              </tr><tr>
                <td>2d</td>
                <td>${mmStr(mpi.precip_2d)}</td><td>${mmStr(mpn.precip_2d)}</td><td>${mmStr(mpe.precip_2d)}</td>
              </tr><tr>
                <td>dry</td>
                <td>${hrsStr(mpi.hours_since_rain)}</td><td>${hrsStr(mpn.hours_since_rain)}</td><td>${hrsStr(mpe.hours_since_rain)}</td>
              </tr><tr>
                <td>3-7d</td>
                <td>${mmStr(mpi.rain_3d_to_7d_mm)}</td><td>${mmStr(mpn.rain_3d_to_7d_mm)}</td><td>${mmStr(mpe.rain_3d_to_7d_mm)}</td>
              </tr>
            </table>
          </div>
        </div>`;
    }

    function renderSlots(slots, trailKey, trailId, date, isToday, signals) {
      return `<div class="slots">${slots.map(s => {
        const vote = isToday ? getSlotVote(date, trailKey, s.slot) : null;
        const hasIntraday = s.precip_midnight_to_slot_mm !== undefined;
        const precip2d = (signals && signals.precip_2d_mm) || 0;
        const hsr = s.features && s.features.hours_since_rain !== undefined
            ? hrsStr(s.features.hours_since_rain) : null;
        const r7d = s.features && s.features.rain_3d_to_7d_mm !== undefined
            ? s.features.rain_3d_to_7d_mm.toFixed(1) + 'mm 3-7d' : null;
        const sigHtml = hasIntraday ? `
          <div class="slot-signals">
            <span>${s.precip_midnight_to_slot_mm}mm fcst</span>
            <span>${precip2d}mm 2d</span>
            ${hsr ? `<span>${hsr}</span>` : ''}
            ${r7d ? `<span>${r7d}</span>` : ''}
          </div>` : '';
        const fbHtml = isToday ? `
          <div class="slot-feedback">
            <span class="fb-label">Actual</span>
            <div class="fb-dots">
              <button class="fb-dot${vote===1?' active':vote===-1?' dim':''}"
                      style="background:#22c55e" data-vote="1" title="Good conditions"
                      onclick="recordFeedback('${date}','${trailKey}',${trailId},${s.hour},'${s.slot}',${s.score},1,this)"></button>
              <button class="fb-dot${vote===-1?' active':vote===1?' dim':''}"
                      style="background:#ef4444" data-vote="-1" title="Bad conditions"
                      onclick="recordFeedback('${date}','${trailKey}',${trailId},${s.hour},'${s.slot}',${s.score},-1,this)"></button>
            </div>
          </div>` : '';
        return `
          <div class="slot-card" style="background:${scoreColor(s.score)}">
            <div class="slot-time">${s.slot}</div>
            <div class="slot-pct-row">
              <span class="slot-pct">${pct(s.score)}</span>
              ${warnIcon(s)}
            </div>
            ${sigHtml}
            ${fbHtml}
          </div>`;
      }).join('')}</div>`;
    }

    function renderDayRow(day, trailKey, trailId, isToday) {
      const hasSlots = day.slots && day.slots.length;
      const s = day.signals || {};
      const soilStr = s.soil_moisture !== undefined
        ? `soil ${s.soil_moisture.toFixed(2)} / ${s.soil_moisture_deep.toFixed(2)}`
        : day.signal;
      const sunStr = s.sunrise ? `🌅 ${s.sunrise} · 🌇 ${s.sunset}` : '';
      return `
        <div class="day-row">
          <div class="day-header">
            <span class="day-label">${day.day_name}</span>
            <span class="day-signal">${soilStr}${sunStr ? '&ensp;' + sunStr : ''}</span>
          </div>
          ${hasSlots
            ? renderSlots(day.slots, trailKey, trailId, day.date, isToday, day.signals)
            : `<div class="slots">
                 <div class="slot-card" style="background:${scoreColor(day.score)};grid-column:1/-1;padding:10px;">
                   <div class="slot-pct" style="font-size:1.3rem">${pct(day.score)}</div>
                 </div>
               </div>`}
        </div>`;
    }

    function warnIconDay(day) {
      const ms = day.model_scores;
      if (!ms || ms.ifs === undefined || ms.nbm === undefined) return '';
      if (Math.abs(ms.ifs - ms.nbm) < 0.25) return '';
      const msi = (day.model_signals || {});
      const mi = msi.ifs || {}, mn = msi.nbm || {}, me = msi.ensemble || {};
      const s0mp = (day.slots && day.slots[0] && day.slots[0].model_precip) || {};
      const hsi = (s0mp.ifs || {}).hours_since_rain, hsn = (s0mp.nbm || {}).hours_since_rain, hse = (s0mp.ensemble || {}).hours_since_rain;
      return `
        <div class="warn-wrap">
          <button class="warn-btn" onclick="toggleWarn(event,this)">⚠️</button>
          <div class="warn-tip">
            <table class="warn-table">
              <tr>
                <th></th><th><a href="feature_importances.html" target="_blank">IFS</a></th><th><a href="feature_importances.html" target="_blank">NBM</a></th><th><a href="feature_importances.html" target="_blank">Ens</a></th>
              </tr><tr>
                <td>%</td>
                <td>${pct(ms.ifs)}</td><td>${pct(ms.nbm)}</td><td>${pct(ms.ensemble)}</td>
              </tr><tr>
                <td>fcst</td>
                <td>${mmStr(mi.forecast_precip_mm)}</td><td>${mmStr(mn.forecast_precip_mm)}</td><td>${mmStr(me.forecast_precip_mm)}</td>
              </tr><tr>
                <td>2d</td>
                <td>${mmStr(mi.precip_2d)}</td><td>${mmStr(mn.precip_2d)}</td><td>${mmStr(me.precip_2d)}</td>
              </tr><tr>
                <td>dry</td>
                <td>${hrsStr(hsi)}</td><td>${hrsStr(hsn)}</td><td>${hrsStr(hse)}</td>
              </tr><tr>
                <td>3-7d</td>
                <td>${mmStr(mi.rain_3d_to_7d_mm)}</td><td>${mmStr(mn.rain_3d_to_7d_mm)}</td><td>${mmStr(me.rain_3d_to_7d_mm)}</td>
              </tr>
            </table>
          </div>
        </div>`;
    }

    function renderWeekCard(day) {
      const s = day.signals || {};
      const sigLines = [];
      if (s.forecast_precip_mm > 0) sigLines.push(`${s.forecast_precip_mm}mm fcst`);
      if (s.precip_2d_mm > 0) sigLines.push(`${s.precip_2d_mm}mm 2d`);
      if (s.soil_moisture !== undefined)
        sigLines.push(`soil ${s.soil_moisture.toFixed(2)}/${s.soil_moisture_deep.toFixed(2)}`);
      return `
        <div class="day-card" style="background:${scoreColor(day.score)}">
          <div class="card-name">${day.day_name}</div>
          <div class="slot-pct-row">
            <span class="card-pct">${pct(day.score)}</span>
            ${warnIconDay(day)}
          </div>
          ${sigLines.map(l => `<div class="card-signal">${l}</div>`).join('')}
        </div>`;
    }

    function renderReport(report) {
      if (!report) return '<div class="no-report">No recent reports found.</div>';
      const trusted = TRUSTED.has(report.username);
      const age = reportAge(report);
      const dot = COLOR_DOT[report.color] || COLOR_DOT.yellow;
      return `
        <div class="report-card">
          <div class="report-dot" style="background:${dot}"></div>
          <div class="report-body">
            <div class="report-meta">
              <span class="report-user${trusted ? ' trusted' : ''}">${report.username || 'unknown'}</span>
              ${trusted ? '<span class="trusted-badge">trusted</span>' : ''}
              <span class="report-age">${age}</span>
            </div>
            ${report.comment ? `<div class="report-comment">${report.comment}</div>` : ''}
          </div>
        </div>`;
    }

    function renderTrail(trailKey, trail) {
      const trailId = trail.trail_id !== undefined ? trail.trail_id : (trailKey === 'phase1' ? 0 : 1);
      const [today, tomorrow, ...rest] = trail.days;
      return `
        <div class="trail-section">
          <div class="trail-name">${trail.trail_name}</div>
          ${renderDayRow(today, trailKey, trailId, true)}
          ${tomorrow ? renderDayRow(tomorrow, trailKey, trailId, false) : ''}
          ${rest.length ? `<div class="week-days">${rest.map(renderWeekCard).join('')}</div>` : ''}
          <div class="report-section">
            <div class="report-label">Latest MTBProject Report</div>
            ${renderReport(trail.recent_report)}
          </div>
        </div>`;
    }

    function formatUpdated(isoStr) {
      try {
        const d = new Date(isoStr);
        const now = new Date();
        const diffMin = Math.round((now - d) / 60000);
        const diffH = diffMin / 60;
        let text, dotColor, stale;
        if (diffMin < 2)       { text = 'Updated just now';               dotColor = '#22c55e'; stale = false; }
        else if (diffMin < 60) { text = `Updated ${diffMin} min ago`;     dotColor = '#22c55e'; stale = false; }
        else if (diffH < 7)    { text = `Updated ${Math.round(diffH)}h ago`; dotColor = '#22c55e'; stale = false; }
        else if (diffH < 13)   { text = `Updated ${Math.round(diffH)}h ago`; dotColor = '#f59e0b'; stale = false; }
        else                   { text = `Updated ${Math.round(diffH)}h ago`; dotColor = '#ef4444'; stale = true; }
        return { text, dotColor, stale };
      } catch { return { text: 'Unknown', dotColor: '#6b7280', stale: false }; }
    }

    Promise.all([
      fetch('predictions.json').then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
      fetch(VOTES_URL + '/votes?all=1').then(r => r.json()).catch(() => []),
    ]).then(([data, votes]) => {
        votes.forEach(v => {
          if (v.trail && v.date && v.slot && v.vote !== undefined)
            remoteVotesMap[`${v.trail}:${v.date}:${v.slot}`] = v.vote;
        });

        const { text, dotColor, stale } = formatUpdated(data.generated_at);
        const el = document.getElementById('updated-time');
        el.innerHTML = `<span class="updated-dot" style="background:${dotColor}"></span>${text}`
          + (stale ? '<span class="stale-warning">⚠ Predictions may be outdated</span>' : '');

        document.getElementById('trails').innerHTML =
          Object.entries(data.trails).map(([k, v]) => renderTrail(k, v)).join('');
      })
      .catch(err => {
        document.getElementById('trails').innerHTML =
          `<div class="error-msg">Failed to load predictions: ${err.message}<br>
           <small>Run predict.py to generate predictions.json</small></div>`;
      });
  </script>
</body>
</html>
