name: Daily Predictions

on:
  schedule:
    # ~5am, ~9am, ~1pm, ~5pm ET (UTC-5 EST baseline, 65min early for GH Actions lag)
    - cron: '55 8 * * *'    # ~5:55am EST
    - cron: '55 12 * * *'   # ~9:55am EST
    - cron: '55 16 * * *'   # ~1:55pm EST
    - cron: '55 20 * * *'   # ~5:55pm EST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictions
        run: VOTES_WORKER_URL=https://mtcp-votes.mr-tony-82.workers.dev python src/predict.py

      - name: Commit updated predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/predictions.json data/training_raw.csv data/feature_snapshots.json
          git diff --staged --quiet || git commit -m "chore: update predictions [skip ci]"
          git push
