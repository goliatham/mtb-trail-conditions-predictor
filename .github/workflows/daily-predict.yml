name: Daily Predictions

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictions
        run: VOTES_WORKER_URL=https://mtcp-votes.mr-tony-82.workers.dev python src/predict.py

      - name: Commit updated predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/predictions.json data/mtb_scrape_raw.csv data/feature_snapshots.json data/last_forecast.json data/weather_cache.json data/creek_gauge.json
          git diff --staged --quiet || git commit -m "chore: update predictions [skip ci]"
          git push
