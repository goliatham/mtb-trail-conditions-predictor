name: Retrain Model

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for retraining (optional)'
        required: false
        default: 'manual retrain'

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape latest condition reports
        run: python src/scraper.py

      - name: Fetch feedback votes from Cloudflare
        run: |
          curl -sf "https://mtcp-votes.mr-tony-82.workers.dev/votes" -o data/user_feedback.json \
            && echo "Fetched $(python3 -c 'import json,sys; print(len(json.load(open("data/user_feedback.json"))))') votes" \
            || echo "[]" > data/user_feedback.json

      - name: Retrain models
        run: python src/train.py

      - name: Run predictions with new model
        run: |
          VOTES_WORKER_URL=https://mtcp-votes.mr-tony-82.workers.dev python src/predict.py

      - name: Mark retrain watermark in Cloudflare
        run: |
          curl -sf -X POST "https://mtcp-votes.mr-tony-82.workers.dev/retrained" || true

      - name: Commit updated model + predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model/ data/training_raw.csv data/user_feedback.json docs/predictions.json data/feature_snapshots.json
          git diff --staged --quiet || git commit -m "chore: retrain model — ${{ github.event.inputs.reason }}"
          git push
